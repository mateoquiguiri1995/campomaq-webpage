#
# CI: Build and push Docker image for the Next.js frontend to Docker Hub (tags: prod and commit SHA).
# CD: Azure App Service pulls the image from Docker Hub via Deployment Center Continuous Deployment.
#
# ------------------
#  REQUIRED SECRETS / VARIABLES
# ------------------
# - DOCKER_USERNAME: Docker Hub username
# - DOCKER_PASSWORD: Docker Hub Access Token (not your password)
# - NEXT_PUBLIC_API_URL_PROD: Public API base URL used at build-time for Next.js PROD environment
#   (store as a GitHub Secret or Repository Variable; referenced during Docker build)
# - GA_TRACKING_ID: Google Analytics tracking ID
#

name: Build and Push Frontend Docker Image to Docker Hub (PROD)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/main_campomaq-ec.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      NEXT_PUBLIC_API_URL_PROD: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
      NEXT_PUBLIC_GA_TRACKING_ID: ${{ secrets.NEXT_PUBLIC_GA_TRACKING_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Validate NEXT_PUBLIC_API_URL_PROD
        run: |
          if [ -z "${NEXT_PUBLIC_API_URL_PROD}" ]; then
            echo "::error::NEXT_PUBLIC_API_URL_PROD is not set. Define it as a GitHub Secret or Repository Variable.";
            exit 1
          fi

      - name: Validate NEXT_PUBLIC_GA_TRACKING_ID
        run: |
          if [ -z "${NEXT_PUBLIC_GA_TRACKING_ID}" ]; then
            echo "::error::NEXT_PUBLIC_GA_TRACKING_ID is not set. Define it as a GitHub Secret or Repository Variable.";
            exit 1
          fi
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Lint (optional but recommended)
        run: |
          cd apps/frontend
          npm run lint --if-present

      - name: Build (smoke test)
        run: |
          cd apps/frontend
          NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL_PROD }} \
          NEXT_PUBLIC_GA_TRACKING_ID=${{ env.NEXT_PUBLIC_GA_TRACKING_ID }} \
          npm run build

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          # Azure App Service runs fine on amd64, and this avoids slow arm64 emulation in CI.
          # Uncomment the multi-arch line below if you want to publish arm64 images again.
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL_PROD }}
            NEXT_PUBLIC_GA_TRACKING_ID=${{ env.NEXT_PUBLIC_GA_TRACKING_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campomaq-app:prod
            ${{ secrets.DOCKER_USERNAME }}/campomaq-app:prod-${{ github.sha }}

      - name: Post-build summary
        run: |
          echo "Pushed tags:"
          echo "${{ secrets.DOCKER_USERNAME }}/campomaq-app:prod"
          echo "${{ secrets.DOCKER_USERNAME }}/campomaq-app:prod-${{ github.sha }}"
